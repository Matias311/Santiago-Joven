services:

  backend:
    build:
      context: ./backend

    container_name: backend

    env_file:
      - .env

    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}

    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend

      # args:
      #   VITE_API_URL: ${VITE_API_URL}

    container_name: frontend

    ports:
      - "3000:80"

    depends_on:
      - backend
