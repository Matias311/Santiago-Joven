volumes:
  maven-cache:

services:
  backend-dev:
    profiles: ["dev"]
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: backend-dev
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: dev
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      URL_DB: ${URL_DB}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    ports:
      - "8080:8080"
    volumes:
      - ./backend/src:/app/src
      - maven-cache:/root/.m2

  frontend-dev:
    profiles: ["dev"]
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: frontend-dev
    environment:
      VITE_API_URL: http://127.0.0.1:8080
    ports:
      - "3000:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
    depends_on:
      - backend-dev

  backend-test:
    profiles: ["test"]
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: backend-test
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: test
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    volumes:
      - ./backend/src:/app/src
      - ./backend/pom.xml:/app/pom.xml
      - maven-cache:/root/.m2
    command: ["mvn", "test"]

  frontend-test:
    profiles: ["test"]
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: frontend-test
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/eslint.config.js:/app/eslint.config.js
    command: ["npm", "run", "lint"]

  frontend-e2e:
    profiles: ["test"]
    image: cypress/included:15.18.0
    container_name: frontend-e2e
    working_dir: /app
    volumes:
      - ./frontend:/app
    entrypoint: []
    command:
      - sh
      - -c
      - "npm ci && npx vite --host 0.0.0.0 --port 5173 & sleep 4 && cypress run"

  backend:
    profiles: ["prod"]
    build:
      context: ./backend
    container_name: backend
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: prod
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      URL_DB: ${URL_DB}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    ports:
      - "8080:8080"

  frontend:
    profiles: ["prod"]
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
