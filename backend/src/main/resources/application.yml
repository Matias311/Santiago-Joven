spring:
  application:
    name: backend

  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}

  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:1025}
    username: ${SMTP_USER:}
    password: ${SMTP_PASS:}
    properties:
      mail:
        smtp:
          auth: ${SMTP_AUTH:false}
          starttls:
            enable: ${SMTP_TLS:false}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

jwt:
  secret: ${JWT_SECRET:4a6f76656e50617261456c456374726f6e69636f5365637265744b6579466f724a5754536861726564}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

app:
  mail:
    from: ${SMTP_FROM:no-reply@santiagojoven.org}
    brevo-api-key: ${BREVO_API_KEY:}
    brevo-url: ${BREVO_API_URL:https://api.brevo.com/v3/smtp/email}
    brevo-timeout-ms: ${BREVO_TIMEOUT_MS:5000}
---
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: ${URL_DB}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
---
spring:
  config:
    activate:
      on-profile: test

  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${URL_DB}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
